name: push-data
description: >
  Commitne vygenerované datové soubory do main. Nejdřív zkusí přímý push;
  pokud ho blokuje branch protection (changes must be made through a PR),
  pushne datovou větev, otevře PR a hned ho squash-mergne. Jakmile by bot
  dostal bypass v branch protection, vrátí se automaticky k přímému pushi.

inputs:
  files:
    description: Mezerami oddělené cesty souborů ke commitnutí
    required: true
  message:
    description: Commit message (squash subject u PR flow)
    required: true
  branch:
    description: Název pracovní datové větve pro PR flow
    required: true

runs:
  using: composite
  steps:
    - name: Commit & push (direct nebo přes PR)
      shell: bash
      env:
        FILES: ${{ inputs.files }}
        MSG: ${{ inputs.message }}
        DATA_BRANCH: ${{ inputs.branch }}
        GH_TOKEN: ${{ github.token }}
      run: |
        set -uo pipefail

        if [ -z "$(git status --porcelain -- $FILES)" ]; then
          echo "Beze změny – nic ke commitu."
          exit 0
        fi

        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

        # Vygenerované soubory stranou; commit se staví vždy nad aktuálním origin/main,
        # takže do main nikdy neodejde nic jiného než datové soubory.
        TMP=$(mktemp -d)
        for f in $FILES; do
          mkdir -p "$TMP/$(dirname "$f")"
          cp "$f" "$TMP/$f"
        done

        build_commit() {
          git fetch origin main
          git checkout -f -B "$DATA_BRANCH" origin/main
          for f in $FILES; do cp "$TMP/$f" "$f"; done
          if [ -z "$(git status --porcelain -- $FILES)" ]; then
            return 1
          fi
          git add -- $FILES
          git commit -m "$MSG"
        }

        if ! build_commit; then
          echo "origin/main už obsahuje stejná data – nic ke commitu."
          exit 0
        fi

        # 1) Přímý push (projde, pokud má github-actions bypass v branch protection)
        if git push origin HEAD:main; then
          echo "Přímý push do main OK."
          exit 0
        fi
        echo "Přímý push zamítnut (branch protection) – jdu přes PR."

        # 2) PR flow: datová větev + PR + okamžitý squash merge
        tries=0
        while true; do
          if git push -f origin "HEAD:refs/heads/$DATA_BRANCH"; then
            gh pr create --base main --head "$DATA_BRANCH" --title "$MSG" \
              --body "Automatický datový refresh – branch protection na main vyžaduje PR." \
              || true
            if gh pr merge "$DATA_BRANCH" --squash --delete-branch --subject "$MSG"; then
              echo "Data mergnuta do main přes PR."
              exit 0
            fi
          fi
          tries=$((tries+1))
          if [ "$tries" -ge 5 ]; then
            echo "PR flow selhal po $tries pokusech." >&2
            exit 1
          fi
          echo "PR flow retry $tries"
          sleep $((RANDOM % 6 + 2))
          if ! build_commit; then
            echo "origin/main už mezitím obsahuje stejná data – hotovo."
            exit 0
          fi
        done
