name: refresh-data

# Týdně přegeneruje public/data/venues.geojson z OpenStreetMap (Overpass) a
# ruční kurátorské vrstvy. Pokud se data změní, commitne je zpět do repa.
# Pozn.: živé nasazení dat na server je zatím MANUÁLNÍ re-deploy – web servíruje
# statický build. Auto-deploy přes Actions zatím neděláme; server SSH klíč
# nedáváme do veřejného repa. Viz README.

on:
  schedule:
    - cron: "0 4 * * 1"   # každé pondělí 04:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install requests

      - name: Rebuild venues.geojson
        run: python data/build_venues.py

      - name: Commit & push data (direct / PR fallback)
        uses: ./.github/actions/push-data
        with:
          files: public/data/venues.geojson
          message: "chore(data): týdenní refresh venues.geojson [skip ci]"
          branch: data-refresh/refresh-data
