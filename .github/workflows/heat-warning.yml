name: heat-warning

# Každých 30 minut stáhne živou výstrahu ČHMÚ (SIVS) před vysokými teplotami pro
# Prahu a přegeneruje public/data/heat-warning.json. Pokud se soubor změnil,
# commitne ho zpět do repa. Frontend ho čte živě z raw.githubusercontent.com,
# takže cron aktualizuje banner výstrahy bez nutnosti redeploye webu.

on:
  schedule:
    - cron: "*/30 * * * *"   # každých 30 minut
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

# Zabraň souběhu (krátký job, ale jistota proti race při commitu).
concurrency:
  group: heat-warning
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install requests

      - name: Fetch heat warning
        run: python data/fetch_heat_warning.py

      - name: Commit & push data (direct / PR fallback)
        uses: ./.github/actions/push-data
        with:
          files: public/data/heat-warning.json
          message: "chore(data): refresh heat-warning.json [skip ci]"
          branch: data-refresh/heat-warning
