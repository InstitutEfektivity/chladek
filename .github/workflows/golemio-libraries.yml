name: Golemio knihovny refresh

# Stahne mestske knihovny Prahy z Golemio a commitne snapshot GeoJSON.
# Klic GOLEMIO_API_KEY je repo secret - nikdy se nedostane do klienta.
# Denni refresh kvuli zivym oteviracim hodinam (frontend pocita open-now).
on:
  schedule:
    - cron: "50 5 * * *" # denne rano
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch Golemio knihovny
        env:
          GOLEMIO_API_KEY: ${{ secrets.GOLEMIO_API_KEY }}
        run: python data/fetch_golemio_libraries.py
      - name: Commit & push data (direct / PR fallback)
        uses: ./.github/actions/push-data
        with:
          files: public/data/libraries.geojson
          message: "chore(data): denni refresh Golemio knihovny [skip ci]"
          branch: data-refresh/golemio-libraries
