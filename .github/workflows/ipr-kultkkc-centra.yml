name: IPR KULTKKC centra refresh

# Stahne komunitni / kulturni centra Prahy (IPR UAP / KULTKKC, neknihovni zarizeni)
# a commitne snapshot GeoJSON. Obcanska AC vrstva - verejne pristupne saly a kluby
# jako mekci utociste pred horkem (Tier B).
# Otevrena data IPR Praha - zadny API klic neni potreba. Staticka vrstva, refresh tydne.
on:
  schedule:
    - cron: "33 6 * * 1" # tydne v pondeli rano (vrstva se meni zridka)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch IPR KULTKKC centra
        run: python data/fetch_ipr_kultkkc_centra.py
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- public/data/civic-centra.geojson; then
            git add public/data/civic-centra.geojson
            git commit -m "chore(data): tydenni refresh IPR KULTKKC centra [skip ci]"
            git push
          else
            echo "Beze zmeny."
          fi
