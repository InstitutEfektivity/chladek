name: Golemio street temperature refresh

# Stáhne pouliční teploty z teploměrů cyklosčítačů (Golemio/CAMEA) a commitne
# snapshot GeoJSON. Klíč GOLEMIO_API_KEY je repo secret – nikdy se nedostane do klienta.
on:
  schedule:
    - cron: "20 * * * *" # každou hodinu ve 20. minutě
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch Golemio street temperatures
        env:
          GOLEMIO_API_KEY: ${{ secrets.GOLEMIO_API_KEY }}
        run: python data/fetch_golemio_temps.py
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- public/data/temp-sensors.geojson; then
            git add public/data/temp-sensors.geojson
            git commit -m "chore(data): hodinovy refresh Golemio pulicni teploty [skip ci]"
            git push
          else
            echo "Beze zmeny."
          fi
