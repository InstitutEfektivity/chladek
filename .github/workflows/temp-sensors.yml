name: Golemio street temperature refresh

# Stáhne pouliční teploty z teploměrů cyklosčítačů (Golemio/CAMEA) a commitne
# snapshot GeoJSON. Klíč GOLEMIO_API_KEY je repo secret – nikdy se nedostane do klienta.
on:
  schedule:
    - cron: "20 * * * *" # každou hodinu ve 20. minutě
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch Golemio street temperatures
        env:
          GOLEMIO_API_KEY: ${{ secrets.GOLEMIO_API_KEY }}
        run: python data/fetch_golemio_temps.py
      - name: Commit & push data (direct / PR fallback)
        uses: ./.github/actions/push-data
        with:
          files: public/data/temp-sensors.geojson
          message: "chore(data): hodinovy refresh Golemio pulicni teploty [skip ci]"
          branch: data-refresh/temp-sensors
