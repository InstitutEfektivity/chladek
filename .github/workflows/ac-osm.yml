name: ac-osm refresh

# Tydne pregeneruje autoritativni AC vrstvy z OpenStreetMap (Overpass):
#   - public/data/ac-areas.geojson  (klimatizovane budovy jako plochy)
#   - public/data/ac-shops.geojson  (znackove klimatizovane prodejny jako body)
#   - public/data/venues.geojson    (bez mall/museum/cinema/library - dedup)
# Bez secretu (otevrena data Overpass). Pokud se data zmeni, commitne je zpet.
on:
  schedule:
    - cron: "45 6 * * 1" # pondeli 06:45 UTC (tydne)
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install requests

      - name: Build ac-areas.geojson
        run: python data/build_ac_areas.py

      - name: Build ac-shops.geojson
        run: python data/build_ac_shops.py

      - name: Build ac-services.geojson (supermarket, banka, fitness, hotel)
        run: python data/build_ac_services.py

      - name: Build lekarny.geojson (SUKL + OSM parovani)
        run: python data/build_lekarny_sukl.py

      - name: Rebuild venues.geojson (dedup)
        run: python data/build_venues.py

      - name: Commit & push data (direct / PR fallback)
        uses: ./.github/actions/push-data
        with:
          files: public/data/ac-areas.geojson public/data/ac-shops.geojson public/data/ac-services.geojson public/data/lekarny.geojson public/data/venues.geojson
          message: "chore(data): tydenni refresh AC vrstev (ac-areas, ac-shops, ac-services, lekarny, venues) [skip ci]"
          branch: data-refresh/ac-osm
