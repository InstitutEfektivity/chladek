name: ac-osm refresh

# Tydne pregeneruje autoritativni AC vrstvy z OpenStreetMap (Overpass):
#   - public/data/ac-areas.geojson  (klimatizovane budovy jako plochy)
#   - public/data/ac-shops.geojson  (znackove klimatizovane prodejny jako body)
#   - public/data/venues.geojson    (bez mall/museum/cinema/library - dedup)
# Bez secretu (otevrena data Overpass). Pokud se data zmeni, commitne je zpet.
on:
  schedule:
    - cron: "45 6 * * 1" # pondeli 06:45 UTC (tydne)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install requests

      - name: Build ac-areas.geojson
        run: python data/build_ac_areas.py

      - name: Build ac-shops.geojson
        run: python data/build_ac_shops.py

      - name: Build ac-services.geojson (supermarket, banka, fitness, hotel)
        run: python data/build_ac_services.py

      - name: Build lekarny.geojson (SUKL + OSM parovani)
        run: python data/build_lekarny_sukl.py

      - name: Rebuild venues.geojson (dedup)
        run: python data/build_venues.py

      - name: Commit changed data (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain public/data/ac-areas.geojson public/data/ac-shops.geojson public/data/ac-services.geojson public/data/lekarny.geojson public/data/venues.geojson)" ]; then
            git add public/data/ac-areas.geojson public/data/ac-shops.geojson public/data/ac-services.geojson public/data/lekarny.geojson public/data/venues.geojson
            git commit -m "chore(data): tydenni refresh AC vrstev (ac-areas, ac-shops, ac-services, lekarny, venues) [skip ci]"
            git pull --rebase origin "${GITHUB_REF_NAME:-main}"
            tries=0
            until git push; do
              tries=$((tries+1)); [ "$tries" -ge 5 ] && { echo "push failed after $tries tries"; exit 1; }
              echo "push race - retry $tries"; sleep $((RANDOM % 6 + 2))
              git pull --rebase origin "${GITHUB_REF_NAME:-main}"
            done
            echo "Data aktualizovana a pushnuta."
          else
            echo "Beze zmeny - nic ke commitu."
          fi
