name: CHMU now temperature refresh

# Stáhne živé měřené teploty pražských stanic ČHMÚ a commitne snapshot GeoJSON.
# Bez API klíče (otevřená data opendata.chmi.cz). ČHMÚ aktualizuje cca po 10 min.
on:
  schedule:
    - cron: "15 * * * *" # každou hodinu v 15. minutě
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch CHMU now temperatures
        run: python data/fetch_chmi_now.py
      - name: Commit & push data (direct / PR fallback)
        uses: ./.github/actions/push-data
        with:
          files: public/data/temp-stations.geojson
          message: "chore(data): hodinovy refresh CHMU now teploty [skip ci]"
          branch: data-refresh/temp-stations
