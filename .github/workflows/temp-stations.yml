name: CHMU now temperature refresh

# Stáhne živé měřené teploty pražských stanic ČHMÚ a commitne snapshot GeoJSON.
# Bez API klíče (otevřená data opendata.chmi.cz). ČHMÚ aktualizuje cca po 10 min.
on:
  schedule:
    - cron: "15 * * * *" # každou hodinu v 15. minutě
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch CHMU now temperatures
        run: python data/fetch_chmi_now.py
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- public/data/temp-stations.geojson; then
            git add public/data/temp-stations.geojson
            git commit -m "chore(data): hodinovy refresh CHMU now teploty [skip ci]"
            git pull --rebase origin "${GITHUB_REF_NAME:-main}"
            tries=0
            until git push; do
              tries=$((tries+1)); [ "$tries" -ge 5 ] && { echo "push failed after $tries tries"; exit 1; }
              echo "push race - retry $tries"; sleep $((RANDOM % 6 + 2))
              git pull --rebase origin "${GITHUB_REF_NAME:-main}"
            done
          else
            echo "Beze zmeny."
          fi
