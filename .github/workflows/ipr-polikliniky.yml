name: IPR polikliniky refresh

# Stahne polikliniky / zdravotni strediska Prahy (IPR UAP) a commitne snapshot GeoJSON.
# Obcanska AC vrstva - cekarny poliklinik jako verejne utociste pred horkem.
# Otevrena data IPR Praha - zadny API klic neni potreba. Staticka vrstva, refresh tydne.
on:
  schedule:
    - cron: "35 6 * * 1" # tydne v pondeli rano (vrstva se meni zridka)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch IPR polikliniky
        run: python data/fetch_ipr_polikliniky.py
      - name: Commit & push data (direct / PR fallback)
        uses: ./.github/actions/push-data
        with:
          files: public/data/ac-civic.geojson
          message: "chore(data): tydenni refresh IPR polikliniky [skip ci]"
          branch: data-refresh/ipr-polikliniky
