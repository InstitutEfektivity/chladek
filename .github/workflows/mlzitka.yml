name: IPR mlzitka refresh

# Stáhne mlžítka „Oázy chladu" z IPR Praha a commitne snapshot GeoJSON.
# Bez API klíče (otevřená data Geoportál Praha). Statická vrstva – refresh týdně.
on:
  schedule:
    - cron: "30 6 * * 1" # pondělí 06:30 UTC (týdně)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch IPR mlzitka
        run: python data/fetch_mlzitka.py
      - name: Commit & push data (direct / PR fallback)
        uses: ./.github/actions/push-data
        with:
          files: public/data/mlzitka.geojson
          message: "chore(data): tydenni refresh IPR mlzitka [skip ci]"
          branch: data-refresh/mlzitka
