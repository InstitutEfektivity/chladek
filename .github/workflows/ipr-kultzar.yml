name: IPR kulturni zarizeni refresh

# Stahne kulturni zarizeni Prahy (IPR UAP) a commitne snapshot GeoJSON.
# Otevrena data IPR Praha - zadny API klic neni potreba. Staticka vrstva, refresh tydne.
on:
  schedule:
    - cron: "40 6 * * 1" # tydne v pondeli rano (vrstva se meni zridka)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch IPR kulturni zarizeni
        run: python data/fetch_ipr_kultzar.py
      - name: Commit & push data (direct / PR fallback)
        uses: ./.github/actions/push-data
        with:
          files: public/data/ac-culture.geojson
          message: "chore(data): tydenni refresh IPR kulturni zarizeni [skip ci]"
          branch: data-refresh/ipr-kultzar
