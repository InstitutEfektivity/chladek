name: Golemio air quality refresh

# Stáhne živé stanice kvality ovzduší z Golemio a commitne snapshot GeoJSON.
# Klíč GOLEMIO_API_KEY je repo secret – nikdy se nedostane do klienta.
on:
  schedule:
    - cron: "5 * * * *" # každou hodinu (Golemio aktualizuje hodinově)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch Golemio air quality
        env:
          GOLEMIO_API_KEY: ${{ secrets.GOLEMIO_API_KEY }}
        run: python data/fetch_golemio_aq.py
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- public/data/air-quality-stations.geojson; then
            git add public/data/air-quality-stations.geojson
            git commit -m "chore(data): hodinový refresh Golemio air quality [skip ci]"
            git pull --rebase origin "${GITHUB_REF_NAME:-main}"
            tries=0
            until git push; do
              tries=$((tries+1)); [ "$tries" -ge 5 ] && { echo "push failed after $tries tries"; exit 1; }
              echo "push race - retry $tries"; sleep $((RANDOM % 6 + 2))
              git pull --rebase origin "${GITHUB_REF_NAME:-main}"
            done
          else
            echo "Beze změny."
          fi
