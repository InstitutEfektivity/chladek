name: Golemio air quality refresh

# Stáhne živé stanice kvality ovzduší z Golemio a commitne snapshot GeoJSON.
# Klíč GOLEMIO_API_KEY je repo secret – nikdy se nedostane do klienta.
on:
  schedule:
    - cron: "5 * * * *" # každou hodinu (Golemio aktualizuje hodinově)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch Golemio air quality
        env:
          GOLEMIO_API_KEY: ${{ secrets.GOLEMIO_API_KEY }}
        run: python data/fetch_golemio_aq.py
      - name: Commit & push data (direct / PR fallback)
        uses: ./.github/actions/push-data
        with:
          files: public/data/air-quality-stations.geojson
          message: "chore(data): hodinový refresh Golemio air quality [skip ci]"
          branch: data-refresh/golemio-aq
