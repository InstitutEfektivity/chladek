name: ac-landmarks refresh

# Tydne pregeneruje vrstvu velkych klimatizovanych verejnych budov jako plochy:
#   - public/data/ac-landmarks.geojson  (muzea, divadla, koncertni/kongresove/
#     vystavni haly, knihovny - pudorys budovy jako jemna vypln, BEZ markeru;
#     doplnuje ac-culture body)
# Bez secretu (otevrena data Overpass). Pokud se data zmeni, commitne je zpet.
on:
  schedule:
    - cron: "42 6 * * 1" # pondeli 06:42 UTC (tydne)
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install requests

      - name: Build ac-landmarks.geojson
        run: python data/build_ac_landmarks.py

      - name: Commit & push data (direct / PR fallback)
        uses: ./.github/actions/push-data
        with:
          files: public/data/ac-landmarks.geojson
          message: "chore(data): tydenni refresh ac-landmarks (velke AC verejne budovy jako plochy) [skip ci]"
          branch: data-refresh/ac-landmarks
