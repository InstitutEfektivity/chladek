name: IPR KULTKKC knihovny refresh

# Stahne knihovny vnejsich casti Prahy (IPR UAP / KULTKKC), deduplikuje proti
# autoritativni MKP vrstve (public/data/libraries.geojson) a commitne snapshot.
# Otevrena data IPR Praha - zadny API klic neni potreba. Staticka vrstva, refresh tydne.
on:
  schedule:
    - cron: "32 6 * * 1" # tydne v pondeli rano (vrstva se meni zridka)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch IPR KULTKKC knihovny
        run: python data/fetch_ipr_kultkkc.py
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- public/data/libraries-kkc.geojson; then
            git add public/data/libraries-kkc.geojson
            git commit -m "chore(data): tydenni refresh IPR KULTKKC knihovny [skip ci]"
            git push
          else
            echo "Beze zmeny."
          fi
