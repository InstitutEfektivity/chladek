name: IPR KULTKKC knihovny refresh

# Stahne knihovny vnejsich casti Prahy (IPR UAP / KULTKKC), deduplikuje proti
# autoritativni MKP vrstve (public/data/libraries.geojson) a commitne snapshot.
# Otevrena data IPR Praha - zadny API klic neni potreba. Staticka vrstva, refresh tydne.
on:
  schedule:
    - cron: "32 6 * * 1" # tydne v pondeli rano (vrstva se meni zridka)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch IPR KULTKKC knihovny
        run: python data/fetch_ipr_kultkkc.py
      - name: Commit & push data (direct / PR fallback)
        uses: ./.github/actions/push-data
        with:
          files: public/data/libraries-kkc.geojson
          message: "chore(data): tydenni refresh IPR KULTKKC knihovny [skip ci]"
          branch: data-refresh/ipr-kultkkc
